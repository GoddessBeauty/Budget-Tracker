<div id="budget-root"></div>
<style>
  #budget-root {
    font-family: Georgia, 'Iowan Old Style', serif;
    color: #33143D;
    background: radial-gradient(circle at 15% 0%, #FFE3F2 0%, #FFFFFF 55%), #FFFFFF;
    border-radius: 16px;
    padding: 28px 26px 30px;
    max-width: 640px;
    margin: 0 auto;
    box-shadow: 0 0 40px rgba(255,201,77,0.08), inset 0 1px 0 rgba(255,255,255,0.03);
  }
  #budget-root * { box-sizing: border-box; font-family: inherit; }
  #budget-root .sans { font-family: 'Avenir Next', 'Segoe UI', Helvetica, Arial, sans-serif; }
  #budget-root h1 {
    font-size: 24px; font-weight: 800; margin: 0 0 2px; letter-spacing: 0.3px;
    background: linear-gradient(90deg, #FF2E9A 0%, #00C2D6 35%, #C6FF3D 65%, #FF2E9A 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: #FF2E9A;
    text-shadow: 0 0 24px rgba(255,201,77,0.25);
  }
  #budget-root .sub { font-size: 13px; color: #8A4A78; margin: 0 0 22px; }
  #budget-root .section-title {
    font-size: 12px; text-transform: uppercase; letter-spacing: 1.2px; color: #FF2E9A;
    margin: 26px 0 10px; font-family: 'Avenir Next', 'Segoe UI', sans-serif; font-weight: 600;
  }
  #budget-root .row {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 9px 0; border-bottom: 1px solid #3E3225;
  }
  #budget-root .row:last-child { border-bottom: none; }
  #budget-root .row label { font-size: 14px; color: #33143D; flex: 1; }
  #budget-root .row .hint { display: block; font-size: 11px; color: #A868A0; font-family: 'Avenir Next', sans-serif; margin-top: 2px; }
  #budget-root input[type="text"].num-field {
    width: 90px; background: #FFF0FA; border: 1px solid #FF2E9A; color: #33143D;
    border-radius: 6px; padding: 6px 8px; font-size: 14px; text-align: right;
    font-family: 'Avenir Next', sans-serif;
    -moz-appearance: textfield;
  }
  #budget-root input[type="text"].num-field::-webkit-inner-spin-button,
  #budget-root input[type="text"].num-field::-webkit-outer-spin-button {
    -webkit-appearance: none; margin: 0;
  }
  #budget-root .stepper {
    display: flex; align-items: center; gap: 6px;
  }
  #budget-root .stepper input[type="text"].num-field { width: 76px; text-align: center; }
  #budget-root .step-btn {
    width: 30px; height: 30px; min-width: 30px; border-radius: 8px; padding: 0;
    display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 700;
    line-height: 1;
  }
  #budget-root input[type="text"].num-field:focus { outline: none; border-color: #FF2E9A; }
  #budget-root input[type="range"] { width: 100%; accent-color: #FF2E9A; }
  #budget-root .gauge-wrap { margin: 6px 0 4px; }
  #budget-root .gauge-track {
    width: 100%; height: 14px; background: #FFF0FA; border-radius: 7px; overflow: hidden; position: relative;
  }
  #budget-root .gauge-fill {
    height: 100%; border-radius: 7px 0 0 7px; transition: width 0.25s ease, background 0.25s ease;
  }
  #budget-root .gauge-labels {
    display: flex; justify-content: space-between; font-size: 11px; color: #B0579E; margin-top: 6px;
    font-family: 'Avenir Next', sans-serif;
  }
  #budget-root .stat-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 14px 0 4px;
  }
  #budget-root .stat-card {
    background: #FFF0FA; border-radius: 10px; padding: 12px 12px;
    border: 1px solid #00C2D6; box-shadow: 0 0 16px rgba(124,58,237,0.18);
  }
  #budget-root .stat-label {
    font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.6px; color: #B0579E;
    font-family: 'Avenir Next', sans-serif; margin-bottom: 4px;
  }
  #budget-root .stat-value { font-size: 19px; font-weight: 700; color: #33143D; }
  #budget-root .stat-value.warn { color: #FF4D8D; }
  #budget-root .stat-value.good { color: #6EFFC9; }
  #budget-root .stat-value.rollover { color: #9B5FE0; }
  #budget-root .stat-value.savings-stat { color: #FF2E9A; }
  #budget-root .note {
    font-size: 12px; color: #8A4A78; margin-top: 16px; font-family: 'Avenir Next', sans-serif;
    line-height: 1.5; background: #FFF0FA; border-radius: 8px; padding: 10px 12px;
    border-left: 3px solid #FF2E9A;
  }
  #budget-root .save-status {
    font-size: 11px; color: #A868A0; text-align: right; margin-top: 12px; font-family: 'Avenir Next', sans-serif;
    height: 14px;
  }
  #budget-root .tabs {
    display: flex; gap: 6px; margin: 0 0 20px; background: #FFE3F2; border-radius: 10px; padding: 4px;
  }
  #budget-root .tab-btn {
    flex: 1; text-align: center; padding: 8px 10px; border-radius: 7px; font-size: 13px;
    font-family: 'Avenir Next', sans-serif; font-weight: 600; color: #B0579E; cursor: pointer;
    border: none; background: transparent;
  }
  #budget-root .tab-btn.active { background: linear-gradient(135deg, #FF2E9A, #FF6FC4); color: #FFFFFF; box-shadow: 0 2px 10px rgba(255,46,154,0.35); }
  #budget-root .readout {
    font-size: 14px; color: #33143D; font-family: 'Avenir Next', sans-serif; font-weight: 600;
  }
  #budget-root button {
    background: linear-gradient(135deg, #FF2E9A 0%, #FF6FC4 100%);
    color: #FFFFFF; border: none; border-radius: 8px;
    padding: 10px 14px; font-size: 14px; font-weight: 700; cursor: pointer;
    font-family: 'Avenir Next', sans-serif;
    box-shadow: 0 2px 12px rgba(255,143,216,0.25);
  }
  #budget-root button:hover { background: linear-gradient(135deg, #FF6FC4 0%, #FF9BD8 100%); }
</style>
<script>
(function(){
  // Fallback: if this file is opened outside Claude.ai, window.storage won't exist.
  // This polyfill makes it work standalone using the browser's own localStorage,
  // so the exact same file works both inside Claude and as a downloaded, hosted page.
  if (!window.storage) {
    window.storage = {
      get: function(key){
        return new Promise(function(resolve, reject){
          try {
            var v = localStorage.getItem(key);
            if (v === null) { reject(new Error('not found')); return; }
            resolve({ key: key, value: v, shared: false });
          } catch(e){ reject(e); }
        });
      },
      set: function(key, value){
        return new Promise(function(resolve, reject){
          try {
            localStorage.setItem(key, value);
            resolve({ key: key, value: value, shared: false });
          } catch(e){ reject(e); }
        });
      },
      delete: function(key){
        return new Promise(function(resolve, reject){
          try { localStorage.removeItem(key); resolve({ key: key, deleted: true, shared: false }); }
          catch(e){ reject(e); }
        });
      },
      list: function(prefix){
        return new Promise(function(resolve, reject){
          try {
            var keys = [];
            for (var i=0; i<localStorage.length; i++){
              var k = localStorage.key(i);
              if (!prefix || k.indexOf(prefix) === 0) keys.push(k);
            }
            resolve({ keys: keys, prefix: prefix, shared: false });
          } catch(e){ reject(e); }
        });
      }
    };
  }

  var root = document.getElementById('budget-root');
  var TAKE_HOME = 4465.10;
  var STORAGE_KEY = 'laura-monthly-budget-v1';

  var state = {
    ymca: 72.65,
    capcut: 20,
    classpass: 99,
    disneyCost: 32.99,
    citibike: 6,
    claudePro: 20,
    icloud: 9.99,
    amazonPrime: 6.99,
    amazonGrocery: 4.99,
    spotifyDuo: 16.99,
    carInsurance: 0,
    trainingTotal: 1200,
    trainingMonths: 3,
    cleaningCost: 125,
    clothes: 400,
    selfcare: 300,
    dateNight: 150,
    taxFundTotal: 5000,
    taxFundMonths: 10,
    kidsActivitiesTotal: 380,
    kidsActivitiesMonths: 3,
    instacartTotal: 99,
    laundryWeekly: 20,
    groceries: 800,
    emergencyFund: 600,
    investing: 0,
    plan529: 100,
    cap: 3600
  };

  function fmt(n){
    return '$' + n.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  }

  // Re-renders the view without losing keyboard focus/cursor position — needed because
  // every render() rebuilds the whole tab's HTML, which normally kicks focus out of
  // whatever field was being typed in after every single keystroke.
  function rerenderKeepingFocus(activeEl, rerenderFn){
    var selStart = null, selEnd = null, selector = null;
    var rawValue = activeEl.value;
    try { selStart = activeEl.selectionStart; selEnd = activeEl.selectionEnd; } catch(e){}
    if (activeEl.id) {
      selector = '#' + activeEl.id;
    } else {
      var parts = [];
      Array.prototype.forEach.call(activeEl.attributes, function(attr){
        if (attr.name.indexOf('data-') === 0) parts.push('[' + attr.name + '="' + attr.value.replace(/"/g,'\\"') + '"]');
      });
      if (parts.length) selector = 'input' + parts.join('');
    }
    rerenderFn();
    if (selector) {
      var newEl = root.querySelector(selector);
      if (newEl) {
        // Restore exactly what the person typed (e.g. "72." or "72.5"), not the
        // rounded/parsed number the re-render would otherwise show — that's what
        // was silently eating decimal points after every keystroke.
        newEl.value = rawValue;
        newEl.focus();
        if (selStart !== null) {
          try { newEl.setSelectionRange(selStart, selEnd); } catch(e){}
        }
      }
    }
  }

  function computed(){
    var trainingMonthly = state.trainingMonths > 0 ? state.trainingTotal / state.trainingMonths : 0;
    var cleaningMonthly = state.cleaningCost * (26/12);
    var instacartMonthly = state.instacartTotal / 12;
    var fixed = state.ymca + state.capcut + state.classpass + state.carInsurance + state.disneyCost + state.citibike + state.claudePro + state.icloud + state.amazonPrime + state.amazonGrocery + state.spotifyDuo + trainingMonthly + cleaningMonthly + instacartMonthly;
    var taxFundMonthly = state.taxFundMonths > 0 ? state.taxFundTotal / state.taxFundMonths : 0;
    var kidsActivitiesMonthly = state.kidsActivitiesMonths > 0 ? state.kidsActivitiesTotal / state.kidsActivitiesMonths : 0;
    var laundryMonthly = state.laundryWeekly * (52/12);
    var sinking = state.clothes + state.selfcare + state.dateNight + taxFundMonthly + kidsActivitiesMonthly;
    var variable = state.groceries + laundryMonthly;
    var savings = state.emergencyFund + state.investing + state.plan529;
    var committed = fixed + sinking + variable + savings;
    var leftover = TAKE_HOME - committed;
    return { fixed: fixed, trainingMonthly: trainingMonthly, cleaningMonthly: cleaningMonthly, taxFundMonthly: taxFundMonthly, kidsActivitiesMonthly: kidsActivitiesMonthly, instacartMonthly: instacartMonthly, laundryMonthly: laundryMonthly, sinking: sinking, variable: variable, savings: savings, committed: committed, leftover: leftover };
  }

  var viewMode = 'monthly';
  var HISTORY_KEY = 'laura-budget-history-v1';
  var history = { months: {} };
  var BALANCES_KEY = 'laura-budget-balances-v1';
  var balances = { general: 2974, emergencyFund: 0, selfCare: 0, billsFund: 0, damianFund: 0, taxFund: 0, plan529: 0, investing: 0 };

  var MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  function monthLabel(key){
    var parts = key.split('-');
    return MONTH_NAMES[parseInt(parts[1],10)-1] + ' ' + parts[0];
  }

  function sortedMonthKeys(){
    return Object.keys(history.months).sort();
  }

  function nextMonthKey(){
    var keys = sortedMonthKeys();
    var base;
    if (keys.length === 0) {
      var now = new Date();
      base = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
    } else {
      var last = keys[keys.length-1].split('-');
      var y = parseInt(last[0],10), m = parseInt(last[1],10);
      m += 1;
      if (m > 12) { m = 1; y += 1; }
      base = y + '-' + String(m).padStart(2,'0');
    }
    return base;
  }

  function tabsHtml(){
    return '<div class="tabs">' +
      '<button class="tab-btn' + (viewMode === 'monthly' ? ' active' : '') + '" id="tabMonthly">Monthly</button>' +
      '<button class="tab-btn' + (viewMode === 'perCheck' ? ' active' : '') + '" id="tabPerCheck">Per paycheck</button>' +
      '<button class="tab-btn' + (viewMode === 'history' ? ' active' : '') + '" id="tabHistory">History</button>' +
      '<button class="tab-btn' + (viewMode === 'balances' ? ' active' : '') + '" id="tabBalances">Balances</button>' +
    '</div>';
  }

  function render(){
    if (viewMode === 'perCheck') { renderPerCheck(); }
    else if (viewMode === 'history') { renderHistory(); }
    else if (viewMode === 'balances') { renderBalances(); }
    else { renderMonthly(); }
    wireTabButtons();
  }

  function wireTabButtons(){
    var tm = document.getElementById('tabMonthly');
    var tp = document.getElementById('tabPerCheck');
    var th = document.getElementById('tabHistory');
    var tb = document.getElementById('tabBalances');
    if (tm) tm.addEventListener('click', function(){ viewMode = 'monthly'; render(); });
    if (tp) tp.addEventListener('click', function(){ viewMode = 'perCheck'; render(); });
    if (th) th.addEventListener('click', function(){ viewMode = 'history'; render(); });
    if (tb) tb.addEventListener('click', function(){ viewMode = 'balances'; render(); });
  }

  function enhanceSteppers(){
    root.querySelectorAll('input[type="text"].num-field').forEach(function(input){
      if (input.parentElement && input.parentElement.classList.contains('stepper')) return;
      var step = parseFloat(input.getAttribute('step')) || 1;
      var wrap = document.createElement('div');
      wrap.className = 'stepper';
      var minus = document.createElement('button');
      minus.type = 'button';
      minus.className = 'step-btn';
      minus.textContent = '−';
      var plus = document.createElement('button');
      plus.type = 'button';
      plus.className = 'step-btn';
      plus.textContent = '+';

      input.parentNode.insertBefore(wrap, input);
      wrap.appendChild(minus);
      wrap.appendChild(input);
      wrap.appendChild(plus);

      function bump(dir){
        var cur = parseFloat(input.value) || 0;
        var next = Math.round((cur + dir * step) * 100) / 100;
        if (next < 0) next = 0;
        input.value = next;
        input.dispatchEvent(new Event('input', { bubbles: true }));
      }
      minus.addEventListener('click', function(){ bump(-1); });
      plus.addEventListener('click', function(){ bump(1); });
    });
  }

  function renderMonthly(){
    var c = computed();
    var capUsedPct = state.cap > 0 ? Math.min(100, Math.round((c.committed / state.cap) * 100)) : 0;
    var gaugeColor = capUsedPct > 100 ? '#FF4D8D' : (capUsedPct > 85 ? '#FF2E9A' : '#6EFFC9');
    var leftoverAfterCap = state.cap - c.committed;

    root.innerHTML =
      '<h1>Monthly ceiling</h1>' +
      '<p class="sub sans">Take-home ' + fmt(TAKE_HOME) + ' / month · 2 checks of ' + fmt(TAKE_HOME/2) + '</p>' +
      tabsHtml() +

      '<div class="stat-grid" style="grid-template-columns: repeat(2, 1fr);">' +
        '<div class="stat-card"><div class="stat-label">Committed so far</div><div class="stat-value">' + fmt(c.committed) + '</div></div>' +
        '<div class="stat-card"><div class="stat-label">Going to savings</div><div class="stat-value savings-stat">' + fmt(c.savings) + '</div></div>' +
      '</div>' +
      '<div class="stat-grid">' +
        '<div class="stat-card"><div class="stat-label">Your spending cap</div><div class="stat-value">' + fmt(state.cap) + '</div></div>' +
        '<div class="stat-card"><div class="stat-label">Left after cap</div><div class="stat-value ' + (leftoverAfterCap < 0 ? 'warn' : 'good') + '">' + fmt(leftoverAfterCap) + '</div></div>' +
      '</div>' +

      '<div class="gauge-wrap">' +
        '<div class="gauge-track"><div class="gauge-fill" style="width:' + capUsedPct + '%; background:' + gaugeColor + ';"></div></div>' +
        '<div class="gauge-labels"><span>' + capUsedPct + '% of cap committed</span><span>Cap ' + fmt(state.cap) + '</span></div>' +
      '</div>' +

      '<div class="section-title">Set your monthly spending cap</div>' +
      '<div class="row"><label>Hard ceiling for the month<span class="hint">Everything below should fit under this</span></label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="cap" value="' + state.cap + '" step="0.01"></div>' +

      '<div class="section-title">Fixed costs<span class="hint" style="display:inline; margin-left:8px;">' + fmt(c.fixed) + '/mo total</span></div>' +
      '<div class="row"><label>YMCA</label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="ymca" value="' + state.ymca + '" step="0.01"></div>' +
      '<div class="row"><label>CapCut</label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="capcut" value="' + state.capcut + '" step="0.01"></div>' +
      '<div class="row"><label>ClassPass<span class="hint">48 credits/mo plan</span></label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="classpass" value="' + state.classpass + '" step="0.01"></div>' +
      '<div class="row"><label>Disney+</label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="disneyCost" value="' + state.disneyCost + '" step="0.01"></div>' +
      '<div class="row"><label>Citi Bike membership</label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="citibike" value="' + state.citibike + '" step="0.01"></div>' +
      '<div class="row"><label>Claude Pro</label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="claudePro" value="' + state.claudePro + '" step="0.01"></div>' +
      '<div class="row"><label>Apple iCloud storage</label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="icloud" value="' + state.icloud + '" step="0.01"></div>' +
      '<div class="row"><label>Amazon Prime</label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="amazonPrime" value="' + state.amazonPrime + '" step="0.01"></div>' +
      '<div class="row"><label>Amazon Grocery</label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="amazonGrocery" value="' + state.amazonGrocery + '" step="0.01"></div>' +
      '<div class="row"><label>Spotify Duo<span class="hint">Adjust if your real price differs</span></label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="spotifyDuo" value="' + state.spotifyDuo + '" step="0.01"></div>' +
      '<div class="row"><label>Car insurance<span class="hint">Set to $0 for now — update once you have a real policy</span></label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="carInsurance" value="' + state.carInsurance + '" step="0.01"></div>' +
      '<div class="row"><label>Instacart membership<span class="hint">' + fmt(state.instacartTotal) + '/year = ' + fmt(c.instacartMonthly) + '/mo</span></label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="instacartTotal" value="' + state.instacartTotal + '" step="0.01"></div>' +
      '<div class="row"><label>Personal training package<span class="hint">' + fmt(state.trainingTotal) + ' due, spread over ' + state.trainingMonths + ' months = ' + fmt(c.trainingMonthly) + '/mo</span></label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="trainingTotal" value="' + state.trainingTotal + '" step="0.01"></div>' +
      '<div class="row"><label>&nbsp;&nbsp;↳ months to save it in</label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="trainingMonths" value="' + state.trainingMonths + '" step="1" min="1"></div>' +
      '<div class="row"><label>House cleaning (biweekly)<span class="hint">' + fmt(state.cleaningCost) + ' every 2 weeks = ' + fmt(c.cleaningMonthly) + '/mo</span></label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="cleaningCost" value="' + state.cleaningCost + '" step="0.01"></div>' +

      '<div class="section-title">Sinking funds (saved monthly for irregular costs)<span class="hint" style="display:inline; margin-left:8px;">' + fmt(c.sinking) + '/mo total</span></div>' +
      '<div class="row"><label>Date night fund<span class="hint">Placeholder — adjust to what feels right</span></label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="dateNight" value="' + state.dateNight + '" step="0.01"></div>' +
      '<div class="row"><label>Tax fund<span class="hint">' + fmt(state.taxFundTotal) + ' by April 2027, over ' + state.taxFundMonths + ' months = ' + fmt(c.taxFundMonthly) + '/mo</span></label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="taxFundTotal" value="' + state.taxFundTotal + '" step="0.01"></div>' +
      '<div class="row"><label>&nbsp;&nbsp;↳ months to save it in</label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="taxFundMonths" value="' + state.taxFundMonths + '" step="1" min="1"></div>' +
      '<div class="row"><label>Damian\'s activities (swim, zoo membership, more)<span class="hint">' + fmt(state.kidsActivitiesTotal) + ' total, over ' + state.kidsActivitiesMonths + ' months = ' + fmt(c.kidsActivitiesMonthly) + '/mo</span></label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="kidsActivitiesTotal" value="' + state.kidsActivitiesTotal + '" step="0.01"></div>' +
      '<div class="row"><label>&nbsp;&nbsp;↳ months to save it in</label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="kidsActivitiesMonths" value="' + state.kidsActivitiesMonths + '" step="1" min="1"></div>' +
      '<div class="row"><label>Clothes (you + Damian)<span class="hint">$200 per check × 2 = ' + fmt(state.clothes) + '/mo</span></label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="clothes" value="' + state.clothes + '" step="0.01"></div>' +
      '<div class="row"><label>Self-care<span class="hint">Nails ~$100/mo + hair ~$200–250 saved over 3 months</span></label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="selfcare" value="' + state.selfcare + '" step="0.01"></div>' +

      '<div class="section-title">Household &amp; Groceries<span class="hint" style="display:inline; margin-left:8px;">' + fmt(c.variable) + '/mo total</span></div>' +
      '<div class="row"><label>Groceries + household items</label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="groceries" value="' + state.groceries + '" step="0.01"></div>' +
      '<div class="row"><label>Laundry<span class="hint">~$20/week = ' + fmt(c.laundryMonthly) + '/mo</span></label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="laundryWeekly" value="' + state.laundryWeekly + '" step="0.01"></div>' +

      '<div class="section-title">Savings and emergency fund<span class="hint" style="display:inline; margin-left:8px;">' + fmt(c.savings) + '/mo total</span></div>' +
      '<div class="row"><label>Emergency fund contribution<span class="hint">Target ~$2,200 (1 month essentials, updated) · ~3.7 months at this rate</span></label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="emergencyFund" value="' + state.emergencyFund + '" step="0.01"></div>' +
      '<div class="row"><label>Investing contribution<span class="hint">Once the emergency fund has a cushion</span></label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="investing" value="' + state.investing + '" step="0.01"></div>' +
      '<div class="row"><label>Damian\'s 529 plan</label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="plan529" value="' + state.plan529 + '" step="0.01"></div>' +

      '<div class="note">Once car insurance is confirmed and September gets closer for the training charge, update those two fields — everything else recalculates automatically.</div>' +
      '<div class="save-status sans" id="saveStatus"></div>';

    var ids = ['cap','ymca','capcut','classpass','carInsurance','disneyCost','citibike','claudePro','icloud','amazonPrime','amazonGrocery','spotifyDuo','trainingTotal','trainingMonths','cleaningCost','clothes','selfcare','dateNight','taxFundTotal','taxFundMonths','kidsActivitiesTotal','kidsActivitiesMonths','instacartTotal','groceries','laundryWeekly','emergencyFund','investing','plan529'];
    ids.forEach(function(id){
      var el = document.getElementById(id);
      el.addEventListener('input', function(){
        var v = parseFloat(el.value);
        state[id] = isNaN(v) ? 0 : v;
        rerenderKeepingFocus(el, function(){ renderMonthly(); wireTabButtons(); });
        save();
      });
    });
  }

  function renderPerCheck(){
    var c = computed();
    var half = function(n){ return n / 2; };
    var checkAmount = TAKE_HOME / 2;
    var committedPerCheck = half(c.committed);
    var leftoverPerCheck = checkAmount - committedPerCheck;

    function line(labelText, monthlyVal, hintText){
      var hint = hintText ? '<span class="hint">' + hintText + '</span>' : '';
      return '<div class="row"><label>' + labelText + hint + '</label><span class="readout">' + fmt(half(monthlyVal)) + '</span></div>';
    }

    root.innerHTML =
      '<h1>Per paycheck</h1>' +
      '<p class="sub sans">Each check ' + fmt(checkAmount) + ' · twice a month</p>' +
      tabsHtml() +

      '<div class="stat-grid" style="grid-template-columns: repeat(2, 1fr);">' +
        '<div class="stat-card"><div class="stat-label">Committed per check</div><div class="stat-value">' + fmt(committedPerCheck) + '</div></div>' +
        '<div class="stat-card"><div class="stat-label">Left per check</div><div class="stat-value ' + (leftoverPerCheck < 0 ? 'warn' : 'savings-stat') + '">' + fmt(leftoverPerCheck) + '</div></div>' +
      '</div>' +

      '<div class="section-title">Fixed costs<span class="hint" style="display:inline; margin-left:8px;">' + fmt(half(c.fixed)) + '/check total</span></div>' +
      line('YMCA', state.ymca) +
      line('CapCut', state.capcut) +
      line('ClassPass', state.classpass) +
      line('Disney+', state.disneyCost) +
      line('Citi Bike membership', state.citibike) +
      line('Claude Pro', state.claudePro) +
      line('Apple iCloud storage', state.icloud) +
      line('Amazon Prime', state.amazonPrime) +
      line('Amazon Grocery', state.amazonGrocery) +
      line('Spotify Duo', state.spotifyDuo) +
      line('Car insurance', state.carInsurance) +
      line('Instacart membership', c.instacartMonthly) +
      line('Personal training', c.trainingMonthly) +
      line('House cleaning', c.cleaningMonthly) +

      '<div class="section-title">Sinking funds<span class="hint" style="display:inline; margin-left:8px;">' + fmt(half(c.sinking)) + '/check total</span></div>' +
      line('Date night fund', state.dateNight) +
      line('Tax fund', c.taxFundMonthly) +
      line('Damian\'s activities (swim, zoo, etc.)', c.kidsActivitiesMonthly) +
      line('Clothes (you + Damian)', state.clothes) +
      line('Self-care', state.selfcare) +

      '<div class="section-title">Household &amp; Groceries<span class="hint" style="display:inline; margin-left:8px;">' + fmt(half(c.variable)) + '/check total</span></div>' +
      line('Groceries + household', state.groceries) +
      line('Laundry', c.laundryMonthly) +

      '<div class="section-title">Savings and emergency fund<span class="hint" style="display:inline; margin-left:8px;">' + fmt(half(c.savings)) + '/check total</span></div>' +
      line('Emergency fund', state.emergencyFund) +
      line('Investing', state.investing) +
      line('Damian\'s 529 plan', state.plan529) +

      '<div class="note">These are the same monthly numbers split in half — set them on the Monthly tab, this view just shows what to move out of each check.</div>';
  }

  function renderHistory(){
    var keys = sortedMonthKeys();
    var totalReceived = 0, totalSpent = 0, totalSaved = 0, totalRollover = 0;
    keys.forEach(function(k){
      var m = history.months[k];
      m.checks.forEach(function(ch){
        totalReceived += num(ch.received);
        totalSpent += num(ch.spent);
        totalSaved += num(ch.savedAmt);
      });
    });
    totalRollover = totalReceived - totalSpent - totalSaved;

    var html = '<h1>History</h1>' +
      '<p class="sub sans">Every month tracked since you started, with what actually happened per check.</p>' +
      tabsHtml() +
      '<div class="stat-grid">' +
        '<div class="stat-card"><div class="stat-label">Total saved to date</div><div class="stat-value savings-stat">' + fmt(totalSaved) + '</div></div>' +
        '<div class="stat-card"><div class="stat-label">Rolled over</div><div class="stat-value ' + (totalRollover < 0 ? 'warn' : 'rollover') + '">' + fmt(totalRollover) + '</div></div>' +
        '<div class="stat-card"><div class="stat-label">Months tracked</div><div class="stat-value">' + keys.length + '</div></div>' +
      '</div>';

    var nextKey = nextMonthKey();
    if (!history.months[nextKey]) {
      html += '<button id="startMonthBtn" style="width:100%; margin: 10px 0 6px;">Start ' + monthLabel(nextKey) + ' budget</button>';
    }

    keys.slice().reverse().forEach(function(k){
      var m = history.months[k];
      var planned = m.planned;
      var monthReceived = 0, monthSpent = 0, monthSaved = 0;
      m.checks.forEach(function(ch){
        monthReceived += num(ch.received);
        monthSpent += num(ch.spent);
        monthSaved += num(ch.savedAmt);
      });
      var monthRollover = monthReceived - monthSpent - monthSaved;

      html += '<div class="section-title">' + monthLabel(k) + '<span class="hint" style="display:inline; margin-left:8px;">planned committed ' + fmt(planned.committed) + ' · planned savings ' + fmt(planned.savings) + '</span></div>';

      m.checks.forEach(function(ch, i){
        html += '<div class="row" style="flex-wrap:wrap;"><label style="flex-basis:100%; margin-bottom:6px;">Check ' + (i+1) + '</label></div>' +
          '<div class="row"><label>&nbsp;&nbsp;Received</label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" data-month="' + k + '" data-check="' + i + '" data-field="received" value="' + ch.received + '" step="0.01"></div>' +
          '<div class="row"><label>&nbsp;&nbsp;Spent</label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" data-month="' + k + '" data-check="' + i + '" data-field="spent" value="' + ch.spent + '" step="0.01"></div>' +
          '<div class="row"><label>&nbsp;&nbsp;Saved</label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" data-month="' + k + '" data-check="' + i + '" data-field="savedAmt" value="' + ch.savedAmt + '" step="0.01"></div>';
      });

      html += '<div class="stat-grid" style="grid-template-columns: repeat(3, 1fr); margin-bottom: 4px;">' +
        '<div class="stat-card"><div class="stat-label">Spent</div><div class="stat-value">' + fmt(monthSpent) + '</div></div>' +
        '<div class="stat-card"><div class="stat-label">Saved</div><div class="stat-value good">' + fmt(monthSaved) + '</div></div>' +
        '<div class="stat-card"><div class="stat-label">Rolled over</div><div class="stat-value ' + (monthRollover < 0 ? 'warn' : 'rollover') + '">' + fmt(monthRollover) + '</div></div>' +
      '</div>';
    });

    if (keys.length === 0) {
      html += '<div class="note">No months logged yet — start this month above, then log what each check actually brings in, what you spend, and what you save as it happens.</div>';
    } else {
      html += '<div class="note">Enter what actually happened per check. Rolled over = received minus spent minus saved — that\'s the cushion carrying into next month.</div>';
    }

    root.innerHTML = html;

    var startBtn = document.getElementById('startMonthBtn');
    if (startBtn) {
      startBtn.addEventListener('click', function(){
        var c = computed();
        history.months[nextKey] = {
          planned: { committed: c.committed, savings: c.savings },
          checks: [
            { received: 0, spent: 0, savedAmt: 0 },
            { received: 0, spent: 0, savedAmt: 0 }
          ]
        };
        saveHistory();
        renderHistory();
        wireTabButtons();
      });
    }

    root.querySelectorAll('input[data-month]').forEach(function(el){
      el.addEventListener('input', function(){
        var k = el.getAttribute('data-month');
        var idx = parseInt(el.getAttribute('data-check'), 10);
        var field = el.getAttribute('data-field');
        var v = parseFloat(el.value);
        history.months[k].checks[idx][field] = isNaN(v) ? 0 : v;
        saveHistory();
        rerenderKeepingFocus(el, function(){ renderHistory(); wireTabButtons(); });
      });
    });
  }

  function num(v){ var n = parseFloat(v); return isNaN(n) ? 0 : n; }

  function pruneEmptyMonths(){
    if (!history.months) return;
    var changed = false;
    Object.keys(history.months).forEach(function(k){
      var m = history.months[k];
      var isEmpty = m.checks.every(function(ch){
        return num(ch.received) === 0 && num(ch.spent) === 0 && num(ch.savedAmt) === 0;
      });
      if (isEmpty) { delete history.months[k]; changed = true; }
    });
    if (changed) saveHistory();
  }

  function saveHistory(){
    if (!window.storage) return;
    window.storage.set(HISTORY_KEY, JSON.stringify(history), false).catch(function(){});
  }

  function loadHistory(){
    if (!window.storage) return Promise.resolve();
    return window.storage.get(HISTORY_KEY, false).then(function(result){
      if (result && result.value) {
        try { history = JSON.parse(result.value); } catch(e){}
      }
    }).catch(function(){});
  }

  function renderBalances(){
    var total = balances.general + balances.emergencyFund + balances.selfCare + balances.billsFund + balances.damianFund + balances.taxFund + balances.plan529 + balances.investing;
    var accountsSubtotal = balances.general + balances.emergencyFund + balances.selfCare + balances.billsFund + balances.damianFund + balances.taxFund;
    var separateSubtotal = balances.plan529 + balances.investing;
    var emergencyTarget = 2200;
    var emergencyPct = emergencyTarget > 0 ? Math.min(100, Math.round((balances.emergencyFund / emergencyTarget) * 100)) : 0;
    var taxTarget = 5000;
    var taxPct = taxTarget > 0 ? Math.min(100, Math.round((balances.taxFund / taxTarget) * 100)) : 0;

    var html = '<h1>Balances</h1>' +
      '<p class="sub sans">Mapped to your real accounts — General, Emergency, Self-care, Bills fund, Damian\'s fund, and Tax fund.</p>' +
      tabsHtml() +
      '<div class="stat-grid" style="grid-template-columns: 1fr;">' +
        '<div class="stat-card"><div class="stat-label">Total saved across all accounts</div><div class="stat-value savings-stat">' + fmt(total) + '</div></div>' +
      '</div>' +

      '<div class="section-title">Your accounts<span class="hint" style="display:inline; margin-left:8px;">' + fmt(accountsSubtotal) + ' total</span></div>' +
      '<div class="row"><label>General savings<span class="hint">Unassigned leftover — your existing HYSA</span></label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="balGeneral" value="' + balances.general + '" step="0.01"></div>' +
      '<div class="row"><label>Emergency fund<span class="hint">' + emergencyPct + '% of ~' + fmt(emergencyTarget) + ' (1 month essentials) target</span></label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="balEmergency" value="' + balances.emergencyFund + '" step="0.01"></div>' +
      '<div class="row"><label>Self-care<span class="hint">Nails, hair — its own account</span></label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="balSelfCare" value="' + balances.selfCare + '" step="0.01"></div>' +
      '<div class="row"><label>Bills fund<span class="hint">Fixed costs + house cleaning + personal training + Instacart</span></label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="balFixedCushion" value="' + balances.billsFund + '" step="0.01"></div>' +
      '<div class="row"><label>Damian\'s fund<span class="hint">His activities (swim, zoo, etc.) + his clothes</span></label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="balDamian" value="' + balances.damianFund + '" step="0.01"></div>' +
      '<div class="row"><label>Tax fund<span class="hint">' + taxPct + '% of ' + fmt(taxTarget) + ' target · due by April 2027</span></label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="balTax" value="' + balances.taxFund + '" step="0.01"></div>' +

      '<div class="section-title">Separate account types (not regular savings)<span class="hint" style="display:inline; margin-left:8px;">' + fmt(separateSubtotal) + ' total</span></div>' +
      '<div class="row"><label>Damian\'s 529<span class="hint">Needs its own 529 plan account</span></label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="bal529" value="' + balances.plan529 + '" step="0.01"></div>' +
      '<div class="row"><label>Investing<span class="hint">Brokerage / retirement account</span></label><input type="text" inputmode="decimal" class="num-field" pattern="[0-9]*\.?[0-9]*" id="balInvesting" value="' + balances.investing + '" step="0.01"></div>' +

      '<div class="gauge-wrap">' +
        '<div class="gauge-track"><div class="gauge-fill" style="width:' + emergencyPct + '%; background:#6EFFC9;"></div></div>' +
        '<div class="gauge-labels"><span>Emergency fund progress</span><span>' + fmt(balances.emergencyFund) + ' / ' + fmt(emergencyTarget) + '</span></div>' +
      '</div>' +
      '<div class="gauge-wrap">' +
        '<div class="gauge-track"><div class="gauge-fill" style="width:' + taxPct + '%; background:#FF2E9A;"></div></div>' +
        '<div class="gauge-labels"><span>Tax fund progress</span><span>' + fmt(balances.taxFund) + ' / ' + fmt(taxTarget) + '</span></div>' +
      '</div>' +

      '<div class="note">Bills fund covers fixed costs + house cleaning + personal training + Instacart. Damian\'s fund covers his activities and clothes. Tax fund has its own account. Date night now just lives in General savings. The Monthly tab still shows what each piece is worth inside each bucket.</div>' +
      '<div class="save-status sans" id="balSaveStatus"></div>';

    root.innerHTML = html;

    var map = { balGeneral: 'general', balEmergency: 'emergencyFund', balSelfCare: 'selfCare', balFixedCushion: 'billsFund', balDamian: 'damianFund', balTax: 'taxFund', bal529: 'plan529', balInvesting: 'investing' };
    Object.keys(map).forEach(function(id){
      var el = document.getElementById(id);
      el.addEventListener('input', function(){
        var v = parseFloat(el.value);
        balances[map[id]] = isNaN(v) ? 0 : v;
        rerenderKeepingFocus(el, function(){ renderBalances(); wireTabButtons(); });
        saveBalances();
      });
    });
  }

  function saveBalances(){
    var status = document.getElementById('balSaveStatus');
    if (!window.storage) return;
    window.storage.set(BALANCES_KEY, JSON.stringify(balances), false).then(function(){
      if (status) status.textContent = 'Saved';
      setTimeout(function(){ if (status) status.textContent = ''; }, 1200);
    }).catch(function(){});
  }

  function loadBalances(){
    if (!window.storage) return Promise.resolve();
    return window.storage.get(BALANCES_KEY, false).then(function(result){
      if (result && result.value) {
        try {
          var saved = JSON.parse(result.value);
          Object.keys(saved).forEach(function(k){ balances[k] = saved[k]; });
          // Migrate old bucket names into the new umbrella structure
          var migrated = false;
          if ('sinkingFunds' in saved) { balances.general = (balances.general || 0) + (saved.sinkingFunds || 0); delete balances.sinkingFunds; migrated = true; }
          if ('funFunds' in saved) { balances.general = (balances.general || 0) + (saved.funFunds || 0); delete balances.funFunds; migrated = true; }
          if (typeof balances.selfCare === 'undefined') balances.selfCare = 0;
          if (typeof balances.billsFund === 'undefined') balances.billsFund = 0;
          if (typeof balances.damianFund === 'undefined') balances.damianFund = 0;
          if (typeof balances.taxFund === 'undefined') balances.taxFund = 0;
          if (migrated) saveBalances();
        } catch(e){}
      }
    }).catch(function(){});
  }

  function save(){
    var status = document.getElementById('saveStatus');
    if (!window.storage) return;
    window.storage.set(STORAGE_KEY, JSON.stringify(state), false).then(function(){
      if (status) status.textContent = 'Saved';
      setTimeout(function(){ if (status) status.textContent = ''; }, 1200);
    }).catch(function(){
      if (status) status.textContent = 'Could not save';
    });
  }

  function load(){
    if (!window.storage) { render(); return; }
    window.storage.get(STORAGE_KEY, false).then(function(result){
      if (result && result.value) {
        try {
          var saved = JSON.parse(result.value);
          Object.keys(saved).forEach(function(k){ state[k] = saved[k]; });
        } catch(e){}
      }
      return loadHistory();
    }).then(function(){
      pruneEmptyMonths();
      return loadBalances();
    }).then(function(){
      render();
    }).catch(function(){
      render();
    });
  }

  load();
})();
</script>
